@if (isVisible && chords.length > 0) {
  <div class="chord-highlighter">
    <div class="extension-selector">
      @for (ext of extensions; track ext.value) {
        <button
          class="ext-btn"
          [class.active]="chordExtension === ext.value"
          (click)="selectExtension(ext.value)"
        >{{ ext.label }}</button>
      }
    </div>
    <div class="chord-chips">
      @for (chord of chords; track chord.numeral) {
        <button
          class="chord-chip"
          [class.active]="selectedChord === chord"
          (click)="select(chord)"
        >
          <span class="chip-numeral">{{ chord.numeral }}</span>
          <span class="chip-name">{{ chord.name }}</span>
        </button>
      }
    </div>
    @if (canAddToProgression && selectedChord) {
      <button class="add-progression-btn" (click)="onAddToProgression()">+ Progression</button>
    }
  </div>
}
