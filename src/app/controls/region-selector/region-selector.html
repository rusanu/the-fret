<select
  #selectEl
  class="region-select"
  (change)="onChange($event)"
  [disabled]="regions.length === 0"
>
  <option value="">All Neck</option>
  @if (pentatonic.length > 0) {
    <optgroup label="Pentatonic Boxes">
      @for (r of pentatonic; track r.id) {
        <option [value]="r.id">{{ r.name }}</option>
      }
    </optgroup>
  }
  @if (caged.length > 0) {
    <optgroup label="CAGED">
      @for (r of caged; track r.id) {
        <option [value]="r.id">{{ r.name }}</option>
      }
    </optgroup>
  }
  <!-- Blues boxes hidden from UX for now (code preserved in region.ts) -->
</select>
