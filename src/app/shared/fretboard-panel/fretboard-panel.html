<div class="panel">
  <div class="panel-header">
    <span class="panel-type-badge" [class.badge-voicing]="panel.type === 'voicing'">
      {{ panel.type === 'voicing' ? 'chord' : 'snapshot' }}
    </span>
    <span class="panel-title">{{ panel.title }}</span>
    @if (panel.type === 'voicing' && panel.voicing) {
      <button class="panel-add-btn" (click)="addToProgression.emit(panel.voicing!)">+ Progression</button>
    }
    <button class="panel-close" (click)="close.emit(panel.id)" aria-label="Close">✕</button>
  </div>
  <app-fretboard
    [highlightSet]="panel.highlightSet"
    [activeRegion]="panel.activeRegion"
    [voicing]="panel.voicing"
    [showNoteLabels]="panel.type === 'voicing' || panel.showNoteLabels"
    [showDegrees]="panel.showDegrees"
    [tuning]="panel.tuning"
    [chordHighlightPcs]="panel.chordHighlightPcs"
    [dimUnset]="true"
  />
</div>
