<div class="chord-finder">
  <div class="finder-row">
    <span class="control-label">Root</span>
    <app-root-selector (rootSelected)="onRootSelected($event)" />
  </div>
  <div class="finder-row finder-row--inline">
    <select class="type-select" [value]="selectedType.name" (change)="onTypeChange($event)">
      @for (t of chordTypes; track t.name) {
        <option [value]="t.name">{{ t.name }}</option>
      }
    </select>
    @if (isCagedCompatible) {
      <span class="near-label">CAGED</span>
      <select class="shape-select" [value]="selectedShape" (change)="onShapeChange($event)">
        @for (s of shapeOptions; track s.id) {
          <option [value]="s.id">{{ s.label }}</option>
        }
      </select>
    }
    @if (selectedShape === 'auto') {
      <span class="near-label">near fret</span>
      <input
        class="fret-input"
        type="number"
        min="0"
        max="24"
        [value]="targetFret"
        (input)="onFretInput($event)"
      />
    }
    <button class="find-btn" [disabled]="selectedRoot === null" (click)="onFind()">Find</button>
    @if (noResult) {
      <span class="no-result">No voicing found for this shape / tuning combination</span>
    }
  </div>
</div>
