<div class="fretboard-wrap">
  <svg
    class="fretboard"
    [class.dim-unset]="dimUnset && !!highlightSet"
    [class.has-chord-highlight]="!!chordHighlightPcs"
    [attr.viewBox]="viewBox"
    [attr.width]="svgWidth"
    [attr.height]="svgHeight"
    xmlns="http://www.w3.org/2000/svg"
    role="img"
    aria-label="Guitar fretboard"
  >
    <!-- Neck background -->
    <rect
      [attr.x]="neckX" [attr.y]="neckY"
      [attr.width]="neckW" [attr.height]="neckH"
      class="neck-bg"
    />

    <!-- Region bracket overlay (behind notes, on top of neck background) -->
    @if (activeRegion) {
      <rect
        [attr.x]="regionBracketX" [attr.y]="neckY"
        [attr.width]="regionBracketW" [attr.height]="neckH"
        class="region-bracket"
      />
    }

    <!-- Fret inlay dots -->
    @for (dot of inlayDots; track dot.id) {
      <circle [attr.cx]="dot.cx" [attr.cy]="dot.cy" r="4" class="inlay-dot" />
    }

    <!-- Fret wires (n=0 is nut, n>0 are regular fret wires) -->
    @for (wire of fretWires; track wire.x) {
      <line
        [attr.x1]="wire.x" [attr.y1]="neckY"
        [attr.x2]="wire.x" [attr.y2]="neckY + neckH"
        [class.nut]="wire.isNut"
        class="fret-wire"
      />
    }

    <!-- String lines -->
    @for (str of strings; track str.num) {
      <line
        [attr.x1]="stringX1" [attr.y1]="str.y"
        [attr.x2]="stringX2" [attr.y2]="str.y"
        [attr.stroke-width]="str.strokeWidth"
        class="string-line"
      />
    }

    <!-- String number labels -->
    @for (lbl of stringLabels; track lbl.label) {
      <text [attr.x]="lbl.x" [attr.y]="lbl.y" class="string-label" text-anchor="end">{{ lbl.label }}</text>
    }

    <!-- Fret number labels -->
    @for (lbl of fretLabels; track lbl.label) {
      <text [attr.x]="lbl.x" y="14" class="fret-label" text-anchor="middle">{{ lbl.label }}</text>
    }

    <!-- Scale dots (hidden when a voicing is shown) -->
    @if (!voicing) {
      @for (note of notes; track note.id) {
        <circle
          [attr.cx]="note.cx" [attr.cy]="note.cy" [attr.r]="DOT_R"
          [class.note-open]="note.isOpen"
          [class.state-root]="note.state === 'root'"
          [class.state-in-set]="note.state === 'in-set'"
          [class.state-out-of-set]="note.state === 'out-of-set'"
          [class.region-out]="activeRegion && !note.inRegion"
          [class.chord-tone]="chordHighlightPcs && chordHighlightPcs.has(note.pc)"
          [class.chord-fade]="chordHighlightPcs && !chordHighlightPcs.has(note.pc) && (note.state === 'root' || note.state === 'in-set')"
          class="note-dot"
        />
        @if (shouldShowLabel(note)) {
          <text
            [attr.x]="note.cx" [attr.y]="note.cy + 3.5"
            class="note-text"
            text-anchor="middle"
          >{{ labelText(note) }}</text>
        }
      }
    }

    <!-- Voicing dots (shown instead of scale dots) -->
    @if (voicing) {
      @if (voicingBarre) {
        <rect
          class="voicing-barre"
          [attr.x]="voicingBarre.cx - DOT_R"
          [attr.y]="voicingBarre.y1"
          [attr.width]="DOT_R * 2"
          [attr.height]="voicingBarre.y2 - voicingBarre.y1"
          [attr.rx]="DOT_R"
        />
      }
      @for (dot of voicingDots; track dot.id) {
        <circle
          [attr.cx]="dot.cx" [attr.cy]="dot.cy" [attr.r]="DOT_R"
          [class.voicing-root]="dot.isRoot"
          [class.voicing-open]="dot.isOpen"
          class="voicing-dot"
        />
        @if (showNoteLabels) {
          <text
            [attr.x]="dot.cx" [attr.y]="dot.cy + 3.5"
            class="note-text"
            text-anchor="middle"
          >{{ showDegrees ? dot.tone : dot.noteName }}</text>
        }
      }
      @for (m of mutedMarkers; track m.id) {
        <text
          [attr.cx]="m.cx" [attr.cy]="m.cy"
          [attr.x]="m.cx" [attr.y]="m.cy + 4"
          class="muted-marker"
          text-anchor="middle"
        >✕</text>
      }
    }
  </svg>
</div>
