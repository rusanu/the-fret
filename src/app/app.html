<header class="site-header">
  <h1>The Fret</h1>
  <p>Interactive guitar fretboard reference</p>
  <p><a href="https://github.com/rusanu/the-fret">github.com/rusanu/the-fret</a></p>
</header>

<div class="controls-bar">
  <div class="control-group">
    <span class="control-label">Root</span>
    <div class="opt-btns">
      <button class="opt-btn" [class.active]="rootSelectorView === 'linear'" (click)="rootSelectorView = 'linear'">Linear</button>
      <button class="opt-btn" [class.active]="rootSelectorView === 'circle'" (click)="rootSelectorView = 'circle'">Circle of Fifths</button>
    </div>
    @if (rootSelectorView === 'linear') {
      <app-root-selector [selectedPc]="selectedRoot" [inSetPcs]="inSetPcs" [inChordPcs]="chordHighlightPcs" [spelling]="rootSpelling" (rootSelected)="onRootSelected($event)" />
    } @else {
      <app-circle-of-fifths-selector [selectedPc]="selectedRoot" [inSetPcs]="inSetPcs" [inChordPcs]="chordHighlightPcs" [spelling]="rootSpelling" (rootSelected)="onRootSelected($event)" />
    }
  </div>
  <div class="control-group">
    <span class="control-label">Scale / Arpeggio</span>
    <app-pitch-set-selector (setSelected)="onSetSelected($event)" />
  </div>
</div>

<app-chord-highlighter
  [highlightSet]="highlightSet"
  [spelling]="scaleSpelling"
  [canAddToProgression]="canAddChordHighlightToProgression"
  (chordPcsChanged)="onChordHighlighted($event)"
  (chordSelected)="onChordSelected($event)"
  (addToProgression)="onAddChordHighlightToProgression($event)"
/>

<main>
<div class="controls-bar">
  <div class="control-group">
    <span class="control-label">Tuning</span>
    <app-tuning-selector (tuningSelected)="onTuningSelected($event)" />
  </div>
  <div class="control-group">
    <span class="control-label">Labels</span>
    <div class="opt-btns">
      <button class="opt-btn" [class.active]="labelMode === 'notes'"   (click)="labelMode = 'notes'">Notes</button>
      <button class="opt-btn" [class.active]="labelMode === 'degrees'" [disabled]="!highlightSet" (click)="labelMode = 'degrees'">Degrees</button>
    </div>
  </div>  
</div>  
  <app-fretboard
    [tuning]="selectedTuning"
    [highlightSet]="mainVoicing ? null : highlightSet"
    [noteNames]="scaleSpelling"
    [activeRegion]="activeRegion"
    [voicing]="mainVoicing"
    [showNoteLabels]="showNoteLabels"
    [showDegrees]="showDegrees"
    [chordHighlightPcs]="mainVoicing ? null : chordHighlightPcs"
    [dimUnset]="true"
    [regionBands]="regions"
    [selectedRegionId]="activeRegion?.id ?? null"
    (regionBandClick)="onRegionSelected($event)"
  />
</main>
<div class="main-actions">
  <div class="control-group">
    <button class="save-btn" [disabled]="!canSave" (click)="onSaveMain()">Save view</button>
  </div>
</div>
<!-- 
<div class="chord-bar">
  <span class="control-label">Chord finder</span>
  <app-chord-finder [noResult]="chordNoResult" (findChord)="onChordFind($event)" />
</div>
-->

<app-progression-player
  [items]="progressionItems"
  (activeVoicingChanged)="onProgressionActiveVoicingChanged($event)"
  (removeItem)="onRemoveProgressionItem($event)"
  (clearAll)="onClearProgression()"
/>

@if (panels.length > 0) {
  <section class="panels-section">
    @for (panel of panels; track panel.id) {
      <app-fretboard-panel
        [panel]="panel"
        [currentTuning]="selectedTuning"
        (close)="onRemovePanel($event)"
        (addToProgression)="onAddVoicingToProgression($event)"
      />
    }
  </section>
}
