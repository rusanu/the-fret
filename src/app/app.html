<header class="site-header">
  <h1>The Fret</h1>
  <p>Interactive guitar fretboard reference</p>
</header>

<div class="controls-bar">
  <div class="control-group">
    <span class="control-label">Root</span>
    <app-root-selector (rootSelected)="onRootSelected($event)" />
  </div>
  <div class="control-group">
    <span class="control-label">Scale / Arpeggio</span>
    <app-pitch-set-selector (setSelected)="onSetSelected($event)" />
  </div>
  <div class="control-group">
    <span class="control-label">Region</span>
    <app-region-selector
      [regions]="regions"
      [selectedRegionId]="activeRegion?.id ?? null"
      (regionSelected)="onRegionSelected($event)"
    />
  </div>
  <div class="control-group">
    <span class="control-label">View</span>
    <div class="opt-btns">
      <button class="opt-btn" [class.active]="showNoteLabels" (click)="showNoteLabels = !showNoteLabels">Labels</button>
      <button class="opt-btn" [class.active]="showDegrees" [disabled]="!highlightSet" (click)="showDegrees = !showDegrees">Degrees</button>
      <button class="opt-btn" [class.active]="dimUnset" [disabled]="!highlightSet" (click)="dimUnset = !dimUnset">Dim unset</button>
    </div>
  </div>
</div>

<div class="chord-bar">
  <span class="control-label">Chord finder</span>
  <app-chord-finder
    [rootPc]="selectedRoot"
    (findChord)="onChordFind($event)"
    (clearChord)="onChordClear()"
  />
  @if (activeVoicing) {
    <span class="voicing-label">{{ activeVoicing.label }}</span>
  }
</div>

<main>
  <app-fretboard
    [highlightSet]="activeVoicing ? null : highlightSet"
    [activeRegion]="activeRegion"
    [showNoteLabels]="showNoteLabels"
    [showDegrees]="showDegrees"
    [dimUnset]="dimUnset"
    [voicing]="activeVoicing"
  />
</main>
