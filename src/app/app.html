<header class="site-header">
  <h1>The Fret</h1>
  <p>Interactive guitar fretboard reference</p>
</header>

<div class="controls-bar">
  <div class="control-group">
    <span class="control-label">Root</span>
    <app-root-selector [inSetPcs]="inSetPcs" (rootSelected)="onRootSelected($event)" />
  </div>
  <div class="control-group">
    <span class="control-label">Scale / Arpeggio</span>
    <app-pitch-set-selector (setSelected)="onSetSelected($event)" />
  </div>
  <div class="control-group">
    <span class="control-label">Region</span>
    <app-region-selector
      [regions]="regions"
      [selectedRegionId]="activeRegion?.id ?? null"
      (regionSelected)="onRegionSelected($event)"
    />
  </div>
  <div class="control-group">
    <span class="control-label">View</span>
    <div class="opt-btns">
      <button class="opt-btn" [class.active]="showNoteLabels" (click)="showNoteLabels = !showNoteLabels">Notes</button>
      <button class="opt-btn" [class.active]="showDegrees" [disabled]="!highlightSet" (click)="showDegrees = !showDegrees">Degrees</button>
    </div>
  </div>
</div>

<main>
  <app-fretboard
    [highlightSet]="highlightSet"
    [activeRegion]="activeRegion"
    [showNoteLabels]="showNoteLabels"
    [showDegrees]="showDegrees"
    [dimUnset]="true"
  />
  <div class="main-actions">
    <button class="save-btn" [disabled]="!canSave" (click)="onSaveMain()">Save view</button>
  </div>
</main>

<div class="chord-bar">
  <span class="control-label">Chord finder</span>
  <app-chord-finder (findChord)="onChordFind($event)" />
</div>

@if (panels.length > 0) {
  <section class="panels-section">
    @for (panel of panels; track panel.id) {
      <app-fretboard-panel [panel]="panel" (close)="onRemovePanel($event)" />
    }
  </section>
}
